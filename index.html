<!DOCTYPE html>
<html>
<head>
<title>Movies Dunia</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
}

h1 {
  text-align: center;
  color: red;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  width: 150px;
  margin: 10px;
  cursor: pointer;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card p {
  text-align: center;
}

/* 🎬 Player */
.player {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 999;
}

.player iframe,
.player video {
  width: 100%;
  height: 100%;
}

.close {
  position: absolute;
  top: 10px;
  right: 20px;
  font-size: 25px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🎬 Movies Dunia</h1>

<div class="grid" id="movies"></div>

<div id="player"></div>

<script>
const API = "https://movies-dunia-1.onrender.com"; // 🔥 change if needed

async function loadMovies() {
  const res = await fetch(API + "/api/movies");
  const data = await res.json();

  const container = document.getElementById("movies");
  container.innerHTML = "";

  data.forEach(m => {
    container.innerHTML += `
      <div class="card" onclick="play('${m.video}')">
        <img src="${m.poster || 'https://via.placeholder.com/300'}">
        <p>${m.title}</p>
      </div>
    `;
  });
}

function play(link) {
  let playerHTML = "";

  // 🎬 YouTube
  if (link.includes("youtube")) {
    playerHTML = `<iframe src="${link}" frameborder="0" allowfullscreen></iframe>`;
  }
  // 🎬 Direct video
  else {
    playerHTML = `<video src="${link}" controls autoplay></video>`;
  }

  document.getElementById("player").innerHTML = `
    <div class="player">
      <span class="close" onclick="closePlayer()">✖</span>
      ${playerHTML}
    </div>
  `;
}

function closePlayer() {
  document.getElementById("player").innerHTML = "";
}

loadMovies();
</script>

</body>
</html>
