<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movies Dunia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  padding: 15px;
  font-size: 24px;
  color: #e50914;
  font-weight: bold;
}

.movies {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
  gap: 10px;
  padding: 10px;
}

.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.info {
  padding: 8px;
}

.title {
  font-weight: bold;
}

.btn {
  background: #e50914;
  color: white;
  padding: 5px;
  margin-top: 5px;
  display: inline-block;
  font-size: 12px;
  border-radius: 5px;
  text-decoration: none;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

.modal iframe {
  width: 90%;
  height: 50%;
}
</style>
</head>

<body>

<header>🎬 Movies Dunia</header>

<div class="movies" id="movies"></div>

<div class="modal" id="modal" onclick="closeModal()">
  <iframe id="trailer" allowfullscreen></iframe>
</div>

<script>
const API = "https://movies-dunia-1.onrender.com/api/movies";

async function loadMovies() {
  const res = await fetch(API);
  const data = await res.json();

  const container = document.getElementById("movies");
  container.innerHTML = "";

  data.forEach(m => {
    const poster = m.poster || "https://via.placeholder.com/300x450";

    container.innerHTML += `
      <div class="card">
        <img src="${poster}">
        <div class="info">
          <div class="title">${m.title}</div>
          <div>⭐ ${m.rating}</div>

          <a href="${m.link}" target="_blank" class="btn">Play</a>
          <button class="btn" onclick="playTrailer('${m.trailer}')">Trailer</button>
        </div>
      </div>
    `;
  });
}

function playTrailer(url) {
  if (!url || url === "undefined") {
    alert("Trailer not available");
    return;
  }

  document.getElementById("trailer").src = url;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("trailer").src = "";
}

loadMovies();
</script>

</body>
</html>
