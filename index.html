<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movies Dunia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
  color: #111;
}

header {
  padding: 15px;
  font-size: 24px;
  font-weight: bold;
  color: #e50914;
}

.search-box {
  padding: 10px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

/* CATEGORY */
.categories {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.categories button {
  background: #ddd;
  padding: 8px 15px;
  border-radius: 20px;
  border: none;
}

.categories .active {
  background: #e50914;
  color: white;
}

/* MOVIES GRID */
.movies {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  padding: 10px;
}

/* CARD */
.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

/* POSTER */
.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

/* INFO ALWAYS VISIBLE */
.info {
  padding: 10px;
}

.title {
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 5px;
}

.rating {
  font-size: 12px;
  margin-bottom: 8px;
}

/* BUTTONS */
.btn {
  display: inline-block;
  padding: 5px 8px;
  background: #e50914;
  color: white;
  border-radius: 5px;
  text-decoration: none;
  font-size: 12px;
  margin-right: 5px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

.modal iframe {
  width: 90%;
  height: 50%;
}
</style>
</head>

<body>

<header>🎬 Movies Dunia</header>

<div class="search-box">
  <input id="search" placeholder="Search movies...">
</div>

<div class="categories">
  <button class="active" onclick="filterCat('All', this)">All</button>
  <button onclick="filterCat('Hindi', this)">Hindi</button>
  <button onclick="filterCat('Tamil', this)">Tamil</button>
</div>

<div class="movies" id="movies"></div>

<!-- TRAILER -->
<div class="modal" id="modal" onclick="closeModal()">
  <iframe id="trailer" frameborder="0" allowfullscreen></iframe>
</div>

<script>
const API = "https://movies-dunia-1.onrender.com/api/movies";

let allMovies = [];

// LOAD
async function loadMovies() {
  const res = await fetch(API);
  const data = await res.json();
  allMovies = data;
  displayMovies(data);
}

// DISPLAY
function displayMovies(movies) {
  const container = document.getElementById("movies");
  container.innerHTML = "";

  movies.forEach(m => {

    const poster = m.poster && m.poster !== "N/A"
      ? m.poster
      : "https://via.placeholder.com/300x450?text=No+Poster";

    container.innerHTML += `
      <div class="card">
        <img src="${poster}">
        
        <div class="info">
          <div class="title">${m.title || "No Title"}</div>
          <div class="rating">⭐ ${m.rating || "N/A"}</div>

          <a href="${m.link}" target="_blank" class="btn">▶ Play</a>
          <button class="btn" onclick="playTrailer('${m.trailer}')">🎬 Trailer</button>
        </div>

      </div>
    `;
  });
}

// SEARCH
document.getElementById("search").addEventListener("input", function() {
  const val = this.value.toLowerCase();

  const filtered = allMovies.filter(m =>
    m.title && m.title.toLowerCase().includes(val)
  );

  displayMovies(filtered);
});

// CATEGORY
function filterCat(cat, el) {
  let filtered = allMovies;

  if (cat !== "All") {
    filtered = allMovies.filter(m => m.category === cat);
  }

  displayMovies(filtered);

  document.querySelectorAll(".categories button")
    .forEach(btn => btn.classList.remove("active"));

  el.classList.add("active");
}

// TRAILER
function playTrailer(url) {
  if (!url) {
    alert("Trailer not available");
    return;
  }

  document.getElementById("trailer").src = url;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("trailer").src = "";
}

// INIT
loadMovies();
</script>

</body>
</html>
