<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movies Dunia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
  color: #111;
}

/* HEADER */
header {
  padding: 15px;
  font-size: 24px;
  font-weight: bold;
  color: #e50914;
}

/* HERO */
.hero {
  height: 250px;
  background: linear-gradient(to top, #f5f5f5, transparent),
              url('https://i.imgur.com/7wYcG5C.jpg') center/cover;
  display: flex;
  align-items: flex-end;
  padding: 20px;
}

.hero h1 {
  font-size: 28px;
}

/* SEARCH */
.search-box {
  padding: 10px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

/* CATEGORY */
.categories {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.categories button {
  background: #ddd;
  color: #111;
  border: none;
  padding: 8px 15px;
  border-radius: 20px;
  cursor: pointer;
}

.categories .active {
  background: #e50914;
  color: white;
}

/* ROW */
.row {
  padding: 10px;
}

.row h2 {
  margin-bottom: 10px;
}

/* CAROUSEL */
.carousel {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.card {
  min-width: 140px;
  height: 200px;
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  transition: transform 0.3s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* HOVER */
.card:hover {
  transform: scale(1.1);
  z-index: 2;
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(255,255,255,0.95);
  padding: 10px;
  opacity: 0;
  transition: 0.3s;
}

.card:hover .overlay {
  opacity: 1;
}

/* BUTTONS */
.btn {
  display: inline-block;
  margin-top: 5px;
  padding: 5px 10px;
  background: #e50914;
  color: white;
  border-radius: 5px;
  text-decoration: none;
  font-size: 12px;
  border: none;
  cursor: pointer;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

.modal iframe {
  width: 90%;
  height: 50%;
}
</style>
</head>

<body>

<header>🎬 Movies Dunia</header>

<div class="hero">
  <h1>Unlimited Movies</h1>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Search movies...">
</div>

<div class="categories">
  <button class="active" onclick="filterCat('All', this)">All</button>
  <button onclick="filterCat('Hindi', this)">Hindi</button>
  <button onclick="filterCat('Tamil', this)">Tamil</button>
  <button onclick="filterCat('Bengali', this)">Bengali</button>
</div>

<!-- TRENDING -->
<div class="row">
  <h2>🔥 Trending</h2>
  <div class="carousel" id="trending"></div>
</div>

<!-- ALL MOVIES -->
<div class="row">
  <h2>Movies</h2>
  <div class="carousel" id="movies"></div>
</div>

<!-- TRAILER MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
  <iframe id="trailer" src="" frameborder="0" allowfullscreen></iframe>
</div>

<script>
const API = "https://movies-dunia-1.onrender.com/api/movies";

let allMovies = [];

async function loadMovies() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    allMovies = data;

    showTrending(data.slice(0,6));
    displayMovies(data);
  } catch (err) {
    console.log("Error:", err);
  }
}

function createCard(movie) {
  const poster = movie.poster && movie.poster !== "N/A"
    ? movie.poster
    : "https://via.placeholder.com/300x450?text=No+Poster";

  return `
  <div class="card">
    <img src="${poster}">
    <div class="overlay">
      <div>${movie.title}</div>
      <a href="${movie.link}" target="_blank" class="btn">▶ Play</a>
      <button class="btn" onclick="playTrailer('${movie.title}')">🎬 Trailer</button>
    </div>
  </div>
  `;
}

function showTrending(movies) {
  document.getElementById("trending").innerHTML =
    movies.map(createCard).join("");
}

function displayMovies(movies) {
  document.getElementById("movies").innerHTML =
    movies.map(createCard).join("");
}

// SEARCH
document.getElementById("search").addEventListener("input", function() {
  const val = this.value.toLowerCase();

  const filtered = allMovies.filter(m =>
    m.title.toLowerCase().includes(val)
  );

  displayMovies(filtered);
});

// CATEGORY
function filterCat(cat, el) {
  let filtered = allMovies;

  if (cat !== "All") {
    filtered = allMovies.filter(m => m.category === cat);
  }

  displayMovies(filtered);

  document.querySelectorAll(".categories button")
    .forEach(btn => btn.classList.remove("active"));

  el.classList.add("active");
}

// TRAILER
function playTrailer(title) {
  const query = encodeURIComponent(title + " trailer");
  const url = `https://www.youtube.com/embed?listType=search&list=${query}`;

  document.getElementById("trailer").src = url;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("trailer").src = "";
}

loadMovies();
</script>

</body>
</html>
