<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movies Dunia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #141414;
  color: white;
}

header {
  background: black;
  padding: 15px;
  font-size: 24px;
  color: red;
  text-align: center;
}

/* Trending Row */
.trending {
  padding: 10px;
}

.trending h2 {
  margin-left: 10px;
}

.trending-row {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px;
}

.trending-card {
  min-width: 140px;
  cursor: pointer;
}

.trending-card img {
  width: 100%;
  height: 200px;
  border-radius: 8px;
  object-fit: cover;
}

/* Search */
.search-box {
  padding: 10px;
  text-align: center;
}

input {
  width: 90%;
  padding: 10px;
  border-radius: 5px;
  border: none;
}

/* Categories */
.categories {
  display: flex;
  gap: 10px;
  padding: 10px;
  overflow-x: auto;
}

.categories button {
  padding: 8px 15px;
  border-radius: 20px;
  border: none;
  background: #333;
  color: white;
}

.categories .active {
  background: red;
}

/* Grid */
.movies {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
  gap: 15px;
  padding: 15px;
}

.card {
  position: relative;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 220px;
  border-radius: 8px;
}

/* Overlay */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 10px;
  background: linear-gradient(transparent, black);
}

</style>
</head>

<body>

<header>🎬 Movies Dunia</header>

<!-- 🔥 Trending -->
<div class="trending">
  <h2>🔥 Trending Now</h2>
  <div class="trending-row" id="trending"></div>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Search movies...">
</div>

<div class="categories">
  <button onclick="filterCategory('All')" class="active">All</button>
  <button onclick="filterCategory('Hindi')">Hindi</button>
  <button onclick="filterCategory('Tamil')">Tamil</button>
  <button onclick="filterCategory('Bengali')">Bengali</button>
</div>

<div class="movies" id="movies"></div>

<script>
const API = "https://movies-dunia-1.onrender.com/api/movies";

let allMovies = [];
let currentCategory = "All";

async function loadMovies() {
  const res = await fetch(API);
  const data = await res.json();

  allMovies = data;

  displayTrending(data.slice(0, 10)); // latest 10
  displayMovies(data);
}

/* 🔥 Trending */
function displayTrending(movies) {
  const container = document.getElementById("trending");
  container.innerHTML = "";

  movies.forEach(movie => {
    const poster = movie.poster || "https://via.placeholder.com/300x450";

    container.innerHTML += `
      <div class="trending-card" onclick="openMovie('${movie.link}')">
        <img src="${poster}">
      </div>
    `;
  });
}

/* 🎬 Grid */
function displayMovies(movies) {
  const container = document.getElementById("movies");
  container.innerHTML = "";

  movies.forEach(movie => {
    const poster = movie.poster || "https://via.placeholder.com/300x450";

    container.innerHTML += `
      <div class="card" onclick="openMovie('${movie.link}')">
        <img src="${poster}">
        <div class="overlay">${movie.title}</div>
      </div>
    `;
  });
}

function openMovie(link) {
  window.open(link, "_blank");
}

/* Filters */
function filterCategory(category) {
  currentCategory = category;

  document.querySelectorAll(".categories button")
    .forEach(btn => btn.classList.remove("active"));

  event.target.classList.add("active");

  applyFilters();
}

document.getElementById("search").addEventListener("input", applyFilters);

function applyFilters() {
  const value = document.getElementById("search").value.toLowerCase();

  const filtered = allMovies.filter(movie => {
    return (
      (currentCategory === "All" || movie.category === currentCategory) &&
      movie.title.toLowerCase().includes(value)
    );
  });

  displayMovies(filtered);
}

loadMovies();
</script>

</body>
</html>
