<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movies Dunia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #141414;
  color: white;
}

header {
  background: #000;
  padding: 15px;
  font-size: 24px;
  font-weight: bold;
  color: red;
  text-align: center;
}

/* Search */
.search-box {
  padding: 10px;
  text-align: center;
}

input {
  width: 90%;
  padding: 12px;
  border-radius: 5px;
  border: none;
  outline: none;
}

/* Category Buttons */
.categories {
  display: flex;
  gap: 10px;
  padding: 10px;
  overflow-x: auto;
}

.categories button {
  padding: 8px 15px;
  border: none;
  border-radius: 20px;
  background: #333;
  color: white;
  cursor: pointer;
}

.categories button.active {
  background: red;
}

/* Grid */
.movies {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* Card */
.card {
  position: relative;
  cursor: pointer;
  transition: transform 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 8px;
}

/* Overlay */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 10px;
  background: linear-gradient(transparent, black);
  border-radius: 8px;
}

.title {
  font-size: 14px;
  font-weight: bold;
}

.rating {
  font-size: 12px;
  color: gold;
}

/* Play button */
.play {
  position: absolute;
  top: 40%;
  left: 40%;
  font-size: 30px;
  background: rgba(0,0,0,0.6);
  padding: 10px;
  border-radius: 50%;
  display: none;
}

.card:hover .play {
  display: block;
}
</style>
</head>

<body>

<header>🎬 Movies Dunia</header>

<div class="search-box">
  <input type="text" id="search" placeholder="Search movies...">
</div>

<!-- 🎯 Category Filter -->
<div class="categories">
  <button onclick="filterCategory('All')" class="active">All</button>
  <button onclick="filterCategory('Hindi')">Hindi</button>
  <button onclick="filterCategory('Tamil')">Tamil</button>
  <button onclick="filterCategory('Bengali')">Bengali</button>
</div>

<div class="movies" id="movies"></div>

<script>
const API = "https://movies-dunia-1.onrender.com/api/movies";

let allMovies = [];
let currentCategory = "All";

async function loadMovies() {
  const res = await fetch(API);
  const data = await res.json();
  allMovies = data;
  displayMovies(data);
}

function displayMovies(movies) {
  const container = document.getElementById("movies");
  container.innerHTML = "";

  movies.forEach(movie => {
    const poster = movie.poster && movie.poster !== "N/A"
      ? movie.poster
      : "https://via.placeholder.com/300x450?text=No+Image";

    container.innerHTML += `
      <div class="card" onclick="openMovie('${movie.link}')">
        <img src="${poster}">
        <div class="play">▶</div>
        <div class="overlay">
          <div class="title">${movie.title}</div>
          <div class="rating">⭐ ${movie.rating || "N/A"}</div>
        </div>
      </div>
    `;
  });
}

function openMovie(link) {
  window.open(link, "_blank");
}

/* 🔍 Search */
document.getElementById("search").addEventListener("input", function() {
  applyFilters();
});

/* 🎯 Category Filter */
function filterCategory(category) {
  currentCategory = category;

  // Highlight active button
  document.querySelectorAll(".categories button").forEach(btn => {
    btn.classList.remove("active");
  });

  event.target.classList.add("active");

  applyFilters();
}

/* 🔥 Apply both search + category */
function applyFilters() {
  const searchValue = document.getElementById("search").value.toLowerCase();

  let filtered = allMovies.filter(movie => {
    const matchSearch = movie.title.toLowerCase().includes(searchValue);
    const matchCategory = currentCategory === "All" || movie.category === currentCategory;
    return matchSearch && matchCategory;
  });

  displayMovies(filtered);
}

loadMovies();
</script>

</body>
</html>
