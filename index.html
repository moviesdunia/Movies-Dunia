<!DOCTYPE html>
<html>
<head>
<style>
body { background:black; color:white; font-family:sans-serif; }
.row { display:flex; overflow-x:auto; }
.card { min-width:150px; margin:10px; }
.card img { width:100%; height:220px; border-radius:6px; }
</style>
</head>

<body>

<h1>🎬 Movies Dunia</h1>

<h2>🔥 Trending</h2>
<div class="row" id="trending"></div>

<h2>🆕 Latest</h2>
<div class="row" id="latest"></div>

<h2>🎭 Hindi</h2>
<div class="row" id="hindi"></div>

<video id="player" controls style="width:100%"></video>

<script>
async function load() {
  const res = await fetch("/api/movies");
  const movies = await res.json();

  movies.forEach(m => {
    const card = `
      <div class="card" onclick="play('${m.videoUrl}')">
        <img src="${m.poster}">
        <p>${m.title}</p>
      </div>
    `;

    if (m.category === "Trending")
      trending.innerHTML += card;

    if (m.category === "Latest")
      latest.innerHTML += card;

    if (m.language === "Hindi")
      hindi.innerHTML += card;
  });
}

function play(url) {
  player.src = url;
  player.play();
}

load();
</script>

</body>
</html>
