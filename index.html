<!DOCTYPE html>
<html>
<head>
  <title>Movies Dunia</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: black;
    }

    h1 {
      color: red;
    }

    .movies {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      padding: 20px;
    }

    .card {
      width: 150px;
      cursor: pointer;
    }

    .card img {
      width: 100%;
      border-radius: 5px;
    }

    .card:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

<header>
  <h1>Movies Dunia</h1>
</header>

<div class="movies" id="movies"></div>

<script>
async function loadMovies() {
  const res = await fetch("/api/movies");
  const data = await res.json();

  const container = document.getElementById("movies");
  container.innerHTML = "";

  data.forEach(movie => {
    container.innerHTML += `
      <div class="card" onclick="play('${movie.link}')">
        <img src="${movie.poster || 'https://via.placeholder.com/150'}">
        <p>${movie.title}</p>
      </div>
    `;
  });
}

function play(link) {
  window.open(link, "_blank");
}

loadMovies();
</script>

</body>
</html>
