<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movies Dunia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      margin: 0;
    }

    header {
      background: #111;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #00ffcc;
    }

    .search-box {
      padding: 10px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      border-radius: 5px;
      border: none;
      outline: none;
    }

    .movies {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      padding: 10px;
    }

    .card {
      background: #1c1c1c;
      padding: 10px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .card h3 {
      font-size: 15px;
      margin: 5px 0;
    }

    .rating {
      font-size: 13px;
      color: #ccc;
    }

    .btn {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 12px;
      background: #00ffcc;
      color: black;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }

    .btn:hover {
      background: #00ddb3;
    }
  </style>
</head>

<body>

<header>🎬 Movies Dunia</header>

<div class="search-box">
  <input type="text" id="search" placeholder="Search movies...">
</div>

<div class="movies" id="movies"></div>

<script>
const API = "https://movies-dunia-1.onrender.com/api/movies";

let allMovies = [];

async function loadMovies() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    allMovies = data;
    displayMovies(data);
  } catch (err) {
    console.log("Error loading movies:", err);
  }
}

function displayMovies(movies) {
  const container = document.getElementById("movies");
  container.innerHTML = "";

  movies.forEach(movie => {
    container.innerHTML += `
      <div class="card">
        
        <img 
          src="${movie.poster || 'https://dummyimage.com/300x450/000/fff&text=No+Poster'}" 
          alt="${movie.title}"
        />

        <h3>${movie.title}</h3>

        <div class="rating">⭐ ${movie.rating || "N/A"}</div>

        <a href="${movie.link}" target="_blank" class="btn">Watch</a>
      </div>
    `;
  });
}

// 🔍 Search functionality
document.getElementById("search").addEventListener("input", function() {
  const value = this.value.toLowerCase();

  const filtered = allMovies.filter(m =>
    m.title.toLowerCase().includes(value)
  );

  displayMovies(filtered);
});

loadMovies();
</script>

</body>
</html>
