<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movies Dunia</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial, sans-serif;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: black;
  position: sticky;
  top: 0;
  z-index: 10;
}

.logo {
  color: red;
  font-size: 24px;
  font-weight: bold;
}

.search {
  padding: 5px;
  border-radius: 4px;
  border: none;
}

.hero {
  height: 300px;
  background: linear-gradient(to top, black, transparent),
              url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');
  background-size: cover;
  display: flex;
  align-items: flex-end;
  padding: 20px;
  font-size: 30px;
  font-weight: bold;
}

.section {
  padding: 20px;
}

.row {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.card {
  min-width: 150px;
  cursor: pointer;
  transition: transform 0.3s;
}

.card img {
  width: 100%;
  border-radius: 6px;
}

.card:hover {
  transform: scale(1.1);
}

.title {
  font-size: 12px;
  margin-top: 5px;
  text-align: center;
}
</style>
</head>

<body>

<header>
  <div class="logo">Movies Dunia</div>
  <input type="text" class="search" placeholder="Search..." onkeyup="searchMovies(this.value)">
</header>

<div class="hero" id="heroTitle">
  Loading...
</div>

<div class="section">
  <h2>Trending</h2>
  <div class="row" id="moviesRow"></div>
</div>

<script>
let allMovies = [];

// Fetch movies from backend
async function loadMovies() {
  try {
    const res = await fetch("/api/movies");
    const movies = await res.json();

    allMovies = movies;

    if (movies.length > 0) {
      document.getElementById("heroTitle").innerText = movies[0].title;
    }

    renderMovies(movies);

  } catch (err) {
    console.error(err);
  }
}

function renderMovies(movies) {
  const row = document.getElementById("moviesRow");
  row.innerHTML = "";

  movies.forEach(movie => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${movie.poster || 'https://via.placeholder.com/150'}" />
      <div class="title">${movie.title}</div>
    `;

    card.onclick = () => {
      window.open(movie.link, "_blank");
    };

    row.appendChild(card);
  });
}

// Search
function searchMovies(query) {
  const filtered = allMovies.filter(m =>
    m.title.toLowerCase().includes(query.toLowerCase())
  );

  renderMovies(filtered);
}

// Load on start
loadMovies();
</script>

</body>
</html>
