<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movies Dunia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
  color: #111;
}

header {
  padding: 15px;
  font-size: 24px;
  font-weight: bold;
  color: #e50914;
}

/* HERO */
.hero {
  height: 300px;
  display: flex;
  align-items: flex-end;
  padding: 20px;
  color: white;
  background-size: cover;
  background-position: center;
}

/* SEARCH */
.search-box {
  padding: 10px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

/* ROWS */
.row {
  padding: 10px;
}

.row h2 {
  margin-left: 5px;
}

/* SCROLL */
.scroll {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px 5px;
}

/* CARD */
.card {
  min-width: 140px;
  border-radius: 10px;
  overflow: hidden;
  background: white;
  transition: 0.3s;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* HOVER EFFECT */
.card:hover {
  transform: scale(1.1);
}

/* INFO */
.info {
  padding: 8px;
}

.title {
  font-size: 13px;
  font-weight: bold;
}

.rating {
  font-size: 12px;
  margin-bottom: 5px;
}

/* BUTTONS */
.btn {
  background: #e50914;
  color: white;
  padding: 4px 6px;
  border-radius: 4px;
  font-size: 11px;
  text-decoration: none;
  margin-right: 5px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

.modal iframe {
  width: 90%;
  height: 50%;
}
</style>
</head>

<body>

<header>🎬 Movies Dunia</header>

<div class="hero" id="hero"></div>

<div class="search-box">
  <input id="search" placeholder="Search movies...">
</div>

<div class="row">
  <h2>🔥 Trending</h2>
  <div class="scroll" id="trending"></div>
</div>

<div class="row">
  <h2>🎬 All Movies</h2>
  <div class="scroll" id="movies"></div>
</div>

<!-- TRAILER -->
<div class="modal" id="modal" onclick="closeModal()">
  <iframe id="trailer" allowfullscreen></iframe>
</div>

<script>
const API = "https://movies-dunia-1.onrender.com/api/movies";

let allMovies = [];

async function loadMovies() {
  const res = await fetch(API);
  const data = await res.json();

  allMovies = data;

  showHero(data[0]);
  showTrending(data.slice(0,6));
  showMovies(data);
}

/* HERO */
function showHero(movie) {
  const hero = document.getElementById("hero");

  if (!movie) return;

  hero.style.backgroundImage = `url(${movie.poster})`;

  hero.innerHTML = `
    <div>
      <h1>${movie.title}</h1>
      <a href="${movie.link}" target="_blank" class="btn">▶ Play</a>
      <button class="btn" onclick="playTrailer('${movie.trailer}')">🎬 Trailer</button>
    </div>
  `;
}

/* CARD */
function card(m) {
  return `
    <div class="card">
      <img src="${m.poster || 'https://via.placeholder.com/300x450'}">
      <div class="info">
        <div class="title">${m.title}</div>
        <div class="rating">⭐ ${m.rating || "N/A"}</div>

        <a href="${m.link}" target="_blank" class="btn">Play</a>
        <button class="btn" onclick="playTrailer('${m.trailer}')">Trailer</button>
      </div>
    </div>
  `;
}

/* TRENDING */
function showTrending(movies) {
  document.getElementById("trending").innerHTML =
    movies.map(card).join("");
}

/* ALL MOVIES */
function showMovies(movies) {
  document.getElementById("movies").innerHTML =
    movies.map(card).join("");
}

/* SEARCH */
document.getElementById("search").addEventListener("input", function() {
  const val = this.value.toLowerCase();

  const filtered = allMovies.filter(m =>
    m.title.toLowerCase().includes(val)
  );

  showMovies(filtered);
});

/* TRAILER */
function playTrailer(url) {
  if (!url) {
    alert("Trailer not available");
    return;
  }

  document.getElementById("trailer").src = url;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("trailer").src = "";
}

loadMovies();
</script>

</body>
</html>
