<!DOCTYPE html>
<html>
<head>
  <title>Movies Dunia OTT</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
    }

    h1 {
      padding: 10px;
    }

    h2 {
      margin-left: 10px;
    }

    .row {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 10px;
    }

    .card {
      min-width: 200px;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.1);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      cursor: pointer;
    }

    #playerModal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
    }

    video {
      width: 80%;
      max-height: 80%;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🎬 Movies Dunia</h1>

<h2>Trending</h2>
<div class="row" id="trending"></div>

<h2>Latest</h2>
<div class="row" id="latest"></div>

<!-- PLAYER -->
<div id="playerModal">
  <span class="close" onclick="closePlayer()">❌</span>
  <video id="player" controls autoplay></video>
</div>

<script>
const API = "https://movies-dunia-1.onrender.com/videos";

fetch(API)
  .then(res => res.json())
  .then(data => {
    const trending = document.getElementById("trending");
    const latest = document.getElementById("latest");

    data.forEach((video, index) => {

      // 🎯 Generate thumbnail from Cloudinary
      const thumbnail = `https://res.cloudinary.com/dsfklevtl/video/upload/so_1/${video.public_id}.jpg`;

      const card = `
        <div class="card">
          <img src="${thumbnail}" onclick="play('${video.secure_url}')">
        </div>
      `;

      if (index % 2 === 0) {
        trending.innerHTML += card;
      } else {
        latest.innerHTML += card;
      }
    });
  });

function play(url) {
  const modal = document.getElementById("playerModal");
  const player = document.getElementById("player");

  modal.style.display = "flex";
  player.src = url;
  player.play();
}

function closePlayer() {
  const modal = document.getElementById("playerModal");
  const player = document.getElementById("player");

  modal.style.display = "none";
  player.pause();
}
</script>

</body>
</html>
