<!DOCTYPE html>
<html>
<head>
  <title>Movies Dunia</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      position: fixed;
      width: 100%;
      z-index: 100;
    }

    header h1 {
      color: red;
    }

    input {
      padding: 6px;
      border-radius: 4px;
      border: none;
    }

    /* HERO */
    #hero {
      height: 90vh;
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 50px;
    }

    #heroTitle {
      font-size: 50px;
      font-weight: bold;
    }

    #hero button {
      padding: 10px 20px;
      margin-top: 20px;
      background: red;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    /* ROWS */
    .section {
      margin-top: -100px;
      padding: 20px;
    }

    .row {
      display: flex;
      overflow-x: auto;
    }

    .row::-webkit-scrollbar {
      display: none;
    }

    .card {
      min-width: 200px;
      margin-right: 10px;
      transition: transform 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: scale(1.15);
      z-index: 2;
    }

    .card img {
      width: 100%;
      height: 280px;
      border-radius: 6px;
      object-fit: cover;
    }

    .title {
      font-size: 14px;
      text-align: center;
      margin-top: 5px;
    }

    video {
      width: 100%;
      position: fixed;
      bottom: 0;
      background: black;
    }
  </style>
</head>

<body>

<header>
  <h1>🎬 Movies Dunia</h1>
  <input type="text" id="search" placeholder="Search..." onkeyup="searchMovies()">
</header>

<div id="hero">
  <div id="heroTitle"></div>
  <button onclick="playHero()">▶ Play</button>
</div>

<div class="section">
  <h2>🔥 Trending</h2>
  <div class="row" id="trending"></div>

  <h2>🆕 Latest</h2>
  <div class="row" id="latest"></div>

  <h2>🎥 All Movies</h2>
  <div class="row" id="all"></div>
</div>

<video id="player" controls style="display:none;"></video>

<script>
const API = "/api/videos";
let allMovies = [];
let heroMovie = null;

async function loadMovies() {
  const res = await fetch(API);
  const data = await res.json();

  allMovies = data;
  heroMovie = data[0];

  // HERO
  document.getElementById("hero").style.backgroundImage =
    `url(${heroMovie.secure_url})`;

  document.getElementById("heroTitle").innerText =
    formatTitle(heroMovie.public_id);

  render(data);
}

function render(movies) {
  const trending = document.getElementById("trending");
  const latest = document.getElementById("latest");
  const all = document.getElementById("all");

  trending.innerHTML = "";
  latest.innerHTML = "";
  all.innerHTML = "";

  movies.forEach((movie, i) => {

    const card = `
      <div class="card" onclick="play('${movie.secure_url}')">
        <img src="${movie.secure_url}">
        <div class="title">${formatTitle(movie.public_id)}</div>
      </div>
    `;

    if (i % 2 === 0) trending.innerHTML += card;
    else latest.innerHTML += card;

    all.innerHTML += card;
  });
}

function play(url) {
  const player = document.getElementById("player");
  player.style.display = "block";
  player.src = url;
  player.play();
}

function playHero() {
  play(heroMovie.secure_url);
}

function formatTitle(name) {
  return name
    .replace("samples/", "")
    .replace(/-/g, " ")
    .toUpperCase();
}

function searchMovies() {
  const q = document.getElementById("search").value.toLowerCase();

  const filtered = allMovies.filter(m =>
    m.public_id.toLowerCase().includes(q)
  );

  render(filtered);
}

loadMovies();
</script>

</body>
</html>
