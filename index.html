<!DOCTYPE html>
<html>
<head>
  <title>Movies Dunia OTT</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: white;
      font-family: Arial;
    }

    /* NAVBAR */
    .nav {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: black;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-size: 22px;
      color: red;
      font-weight: bold;
    }

    input {
      padding: 6px;
      border-radius: 4px;
      border: none;
    }

    /* HERO */
    .hero {
      height: 60vh;
      background-size: cover;
      display: flex;
      align-items: end;
      padding: 20px;
    }

    .hero h1 {
      font-size: 40px;
      background: rgba(0,0,0,0.6);
      padding: 10px;
      border-radius: 5px;
    }

    /* FILTER */
    .filters {
      padding: 10px;
    }

    .filters button {
      margin-right: 10px;
      padding: 8px 15px;
      border-radius: 20px;
      border: none;
      background: #333;
      color: white;
      cursor: pointer;
    }

    .filters button.active {
      background: red;
    }

    /* ROW */
    .row {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 10px;
    }

    .card {
      min-width: 180px;
      position: relative;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.1);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .title {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-size: 14px;
      background: rgba(0,0,0,0.7);
      padding: 5px;
      border-radius: 4px;
    }

    /* PLAYER */
    #playerModal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    video {
      width: 90%;
      max-height: 80%;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">🎬 Movies Dunia</div>
  <input type="text" id="search" placeholder="Search movies...">
</div>

<!-- HERO -->
<div class="hero" id="hero">
  <h1 id="heroTitle">Loading...</h1>
</div>

<!-- FILTER -->
<div class="filters">
  <button onclick="filterMovies('all')" class="active">All</button>
  <button onclick="filterMovies('hindi')">Hindi</button>
  <button onclick="filterMovies('tamil')">Tamil</button>
</div>

<h2>Trending</h2>
<div class="row" id="trending"></div>

<h2>Latest</h2>
<div class="row" id="latest"></div>

<!-- PLAYER -->
<div id="playerModal">
  <span class="close" onclick="closePlayer()">❌</span>
  <video id="player" controls autoplay></video>
</div>

<script>
const API = "https://movies-dunia-1.onrender.com/movies";
let allMovies = [];

/* LOAD MOVIES */
fetch(API)
  .then(res => res.json())
  .then(data => {
    allMovies = data;

    if (data.length > 0) {
      document.getElementById("hero").style.backgroundImage = `url(${data[0].poster})`;
      document.getElementById("heroTitle").innerText = data[0].title;
    }

    render(data);
  });

/* RENDER */
function render(movies) {
  const trending = document.getElementById("trending");
  const latest = document.getElementById("latest");

  trending.innerHTML = "";
  latest.innerHTML = "";

  movies.forEach((movie, i) => {
    const card = `
      <div class="card" onclick="play('${movie.videoUrl}')">
        <img src="${movie.poster}">
        <div class="title">${movie.title}</div>
      </div>
    `;

    if (i % 2 === 0) trending.innerHTML += card;
    else latest.innerHTML += card;
  });
}

/* SEARCH */
document.getElementById("search").addEventListener("input", (e) => {
  const val = e.target.value.toLowerCase();

  const filtered = allMovies.filter(m =>
    m.title.toLowerCase().includes(val)
  );

  render(filtered);
});

/* FILTER */
function filterMovies(type) {
  document.querySelectorAll(".filters button").forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");

  if (type === "all") return render(allMovies);

  const filtered = allMovies.filter(m =>
    m.category.toLowerCase().includes(type)
  );

  render(filtered);
}

/* PLAYER */
function play(url) {
  const modal = document.getElementById("playerModal");
  const player = document.getElementById("player");

  modal.style.display = "flex";
  player.src = url;
  player.play();
}

function closePlayer() {
  const modal = document.getElementById("playerModal");
  const player = document.getElementById("player");

  modal.style.display = "none";
  player.pause();
}
</script>

</body>
</html>
