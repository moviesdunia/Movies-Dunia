<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Upload Movie</h2>

<input id="title" placeholder="Movie Title"><br><br>
<input id="link" placeholder="Movie Link"><br><br>
<input id="category" placeholder="Category"><br><br>

<button onclick="upload()">Upload</button>
<button onclick="deleteAll()">Delete All</button>

<script>
async function upload() {
  const title = document.getElementById("title").value;
  const link = document.getElementById("link").value;
  const category = document.getElementById("category").value;

  const res = await fetch("/api/movies", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ title, link, category })
  });

  const data = await res.json();
  alert("Uploaded!");
}

async function deleteAll() {
  await fetch("/api/movies", { method: "DELETE" });
  alert("All deleted!");
}
</script>

</body>
</html>
