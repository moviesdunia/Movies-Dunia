<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    input, select {
      padding: 8px;
      margin: 5px;
      width: 300px;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      cursor: pointer;
    }

    .movie {
      border-bottom: 1px solid gray;
      padding: 10px;
    }

    #status {
      margin-top: 10px;
      font-weight: bold;
      color: yellow;
    }
  </style>
</head>

<body>

<h2>🎛 Admin Panel</h2>

<h3>➕ Add Movie</h3>

<input id="title" placeholder="Movie Title"><br>

<select id="category">
  <option>Trending</option>
  <option>Latest</option>
</select><br>

<select id="language">
  <option>Hindi</option>
  <option>English</option>
</select><br>

<input type="file" id="video"><br>

<button onclick="upload()">Upload Movie</button>

<p id="status"></p>

<hr>

<h3>🗑 Manage Movies</h3>

<button onclick="deleteAll()" style="background:red;color:white;">
  Delete All Movies
</button>

<div id="list"></div>

<script>

// LOAD MOVIES
async function loadMovies() {
  const res = await fetch("/api/movies");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(m => {
    list.innerHTML += `
      <div class="movie">
        <b>${m.title}</b><br>
        <button onclick="deleteMovie('${m._id}')">Delete</button>
      </div>
    `;
  });
}

// UPLOAD FUNCTION WITH ERROR + PROGRESS
function upload() {
  const file = document.getElementById("video").files[0];
  if (!file) return alert("Select a video!");

  const form = new FormData();
  form.append("title", document.getElementById("title").value);
  form.append("category", document.getElementById("category").value);
  form.append("language", document.getElementById("language").value);
  form.append("video", file);

  const xhr = new XMLHttpRequest();

  // PROGRESS
  xhr.upload.onprogress = function (e) {
    if (e.lengthComputable) {
      const percent = Math.round((e.loaded / e.total) * 100);
      document.getElementById("status").innerText =
        "Uploading: " + percent + "%";
    }
  };

  // RESPONSE
  xhr.onload = function () {
    if (xhr.status === 200) {
      document.getElementById("status").innerText = "✅ Uploaded!";
      loadMovies();
    } else {
      document.getElementById("status").innerText =
        "❌ Error: " + xhr.responseText;
    }
  };

  // NETWORK ERROR
  xhr.onerror = function () {
    document.getElementById("status").innerText =
      "❌ Network error";
  };

  xhr.open("POST", "/api/add-movie");
  xhr.send(form);

  document.getElementById("status").innerText = "Uploading...";
}

// DELETE ONE
async function deleteMovie(id) {
  await fetch(`/api/delete/${id}`, { method: "DELETE" });
  loadMovies();
}

// DELETE ALL
async function deleteAll() {
  if (!confirm("Delete ALL movies?")) return;

  await fetch("/api/delete-all", { method: "DELETE" });
  loadMovies();
}

// INITIAL LOAD
loadMovies();

</script>

</body>
</html>
