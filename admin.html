<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    input, select {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 100%;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      width: 100%;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }

    .add-btn {
      background: green;
      color: white;
    }

    .delete-btn {
      background: red;
      color: white;
    }
  </style>
</head>

<body>

<h2>🎬 Admin Panel</h2>

<input id="title" placeholder="Movie Title">
<input id="link" placeholder="Telegram Link">
<input id="poster" placeholder="Poster URL">
<input id="rating" placeholder="Rating">

<select id="category">
  <option>Hindi</option>
  <option>Tamil</option>
  <option>Bengali</option>
  <option>Other</option>
</select>

<button class="add-btn" onclick="addMovie()">➕ Add Movie</button>

<button class="delete-btn" onclick="deleteAll()">🗑 Delete All Movies</button>

<script>
const API = "https://movies-dunia-1.onrender.com";

// ➕ Add Movie
async function addMovie() {
  const data = {
    title: document.getElementById("title").value,
    link: document.getElementById("link").value,
    poster: document.getElementById("poster").value,
    rating: document.getElementById("rating").value,
    category: document.getElementById("category").value
  };

  const res = await fetch(API + "/api/add-movie", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  const result = await res.json();

  if (result.success) {
    alert("Movie Added ✅");
  } else {
    alert("Error ❌");
  }
}

// 🗑 Delete All
async function deleteAll() {
  const confirmDelete = confirm("Are you sure? This will delete ALL movies!");

  if (!confirmDelete) return;

  const res = await fetch(API + "/api/delete-all", {
    method: "DELETE"
  });

  const data = await res.json();
  alert(data.message);
}
</script>

</body>
</html>
