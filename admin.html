<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body style="background:black;color:white;font-family:sans-serif">

<h2>Add Movie</h2>

<input placeholder="Title" id="title"><br><br>
<input placeholder="Poster URL (TMDB)" id="poster"><br><br>

<select id="category">
  <option>Trending</option>
  <option>Latest</option>
</select><br><br>

<select id="language">
  <option>Hindi</option>
  <option>Tamil</option>
  <option>English</option>
</select><br><br>

<input type="file" id="video"><br><br>

<button onclick="upload()">Upload</button>

<script>
async function upload() {
  const form = new FormData();

  form.append("title", document.getElementById("title").value);
  form.append("poster", document.getElementById("poster").value);
  form.append("category", document.getElementById("category").value);
  form.append("language", document.getElementById("language").value);
  form.append("video", document.getElementById("video").files[0]);

  await fetch("/api/add-movie", {
    method: "POST",
    body: form
  });

  alert("Uploaded!");
}
</script>

</body>
</html>
