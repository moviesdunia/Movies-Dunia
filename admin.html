<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
</head>
<body>

<h2>Add Movie</h2>

<input id="title" placeholder="Title"><br><br>
<input id="video" placeholder="Video Link"><br><br>
<input id="poster" placeholder="Poster URL"><br><br>

<select id="category">
  <option>Hindi</option>
  <option>Tamil</option>
  <option>Bengali</option>
</select><br><br>

<button onclick="add()">Add Movie</button>

<script>
const API = "https://movies-dunia-1.onrender.com";

async function add() {
  await fetch(API + "/api/add", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      title: title.value,
      video: video.value,
      poster: poster.value,
      category: category.value
    })
  });

  alert("Movie Added");
}
</script>

</body>
</html>
