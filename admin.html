<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      background:black;
      color:white;
      font-family:sans-serif;
      padding:20px;
    }

    input, select {
      padding:8px;
      margin:5px;
      width:300px;
    }

    button {
      padding:8px 12px;
      margin:5px;
      cursor:pointer;
    }

    .movie {
      border-bottom:1px solid gray;
      padding:10px;
    }
  </style>
</head>

<body>

<h2>🎛 Admin Panel</h2>

<h3>Add Movie</h3>

<input id="title" placeholder="Movie Title"><br>

<select id="category">
  <option>Trending</option>
  <option>Latest</option>
</select><br>

<select id="language">
  <option>Hindi</option>
  <option>English</option>
</select><br>

<input type="file" id="video"><br>

<button onclick="upload()">Upload</button>

<hr>

<h3>Manage Movies</h3>

<button onclick="deleteAll()" style="background:red;color:white;">
  Delete All
</button>

<div id="list"></div>

<script>
async function loadMovies() {
  const res = await fetch("/api/movies");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(m => {
    list.innerHTML += `
      <div class="movie">
        <b>${m.title}</b><br>
        <button onclick="deleteMovie('${m._id}')">Delete</button>
      </div>
    `;
  });
}

async function upload() {
  const form = new FormData();

  form.append("title", title.value);
  form.append("category", category.value);
  form.append("language", language.value);
  form.append("video", video.files[0]);

  await fetch("/api/add-movie", {
    method: "POST",
    body: form
  });

  alert("Uploaded!");
  loadMovies();
}

async function deleteMovie(id) {
  await fetch(`/api/delete/${id}`, { method: "DELETE" });
  loadMovies();
}

async function deleteAll() {
  if (!confirm("Delete ALL movies?")) return;

  await fetch("/api/delete-all", { method: "DELETE" });
  loadMovies();
}

loadMovies();
</script>

</body>
</html>
