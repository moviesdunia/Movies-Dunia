<!DOCTYPE html>
<html>
<head>
  <title>Player</title>
</head>
<body>

<video id="player" width="600" controls></video>

<script>
const urlParams = new URLSearchParams(window.location.search);
const video = urlParams.get('video');

document.getElementById('player').src = video;
</script>

</body>
</html>
