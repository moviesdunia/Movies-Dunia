<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
    }
    h1 { color: red; }

    input {
      display: block;
      width: 300px;
      margin: 10px 0;
      padding: 10px;
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Movies Dunia Admin</h1>

<input id="title" placeholder="Movie Title">
<input id="link" placeholder="Movie Link">
<input id="category" placeholder="Category">

<button onclick="upload()">Upload Movie</button>
<button onclick="deleteAll()">Delete All</button>

<p id="status"></p>

<script>
async function upload() {
  const title = document.getElementById("title").value;
  const link = document.getElementById("link").value;
  const category = document.getElementById("category").value;

  document.getElementById("status").innerText = "Uploading...";

  try {
    const res = await fetch("/api/movies", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, link, category })
    });

    const data = await res.json();
    document.getElementById("status").innerText = data.message;

  } catch (err) {
    document.getElementById("status").innerText = "Upload Failed!";
  }
}

async function deleteAll() {
  await fetch("/api/movies", { method: "DELETE" });
  alert("All movies deleted");
}
</script>

</body>
</html>
