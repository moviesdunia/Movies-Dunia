<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
</head>
<body>

<h2>Add Movie</h2>

<input id="title" placeholder="Title"><br><br>
<input id="video" placeholder="Video URL (.mp4)"><br><br>
<input id="poster" placeholder="Poster URL"><br><br>
<input id="category" placeholder="Category"><br><br>
<input id="language" placeholder="Language"><br><br>

<button onclick="uploadMovie()">Upload</button>

<script>
async function uploadMovie() {
  const title = document.getElementById('title').value;
  const videoUrl = document.getElementById('video').value;
  const poster = document.getElementById('poster').value;
  const category = document.getElementById('category').value;
  const language = document.getElementById('language').value;

  await fetch('/api/movies', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      title,
      videoUrl,
      poster,
      category,
      language
    })
  });

  alert('Movie Uploaded!');
}
</script>

</body>
</html>
