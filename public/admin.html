<!DOCTYPE html>
<html>
<body>

<h2>Upload Movie</h2>

<form id="form">
<input name="title" placeholder="Movie Title" required><br><br>
<input name="category" placeholder="Category"><br><br>
<input type="file" name="video" required><br><br>
<button>Upload</button>
</form>

<h2>Movies</h2>
<div id="list"></div>

<script>
form.onsubmit = async (e) => {
  e.preventDefault();

  const fd = new FormData(form);

  await fetch("/api/upload", {
    method:"POST",
    body: fd
  });

  alert("Uploaded!");
  load();
};

async function load() {
  const res = await fetch("/api/movies");
  const data = await res.json();

  list.innerHTML = "";

  data.forEach(m => {
    list.innerHTML += `
      <p>${m.title}
      <button onclick="del('${m._id}')">Delete</button></p>
    `;
  });
}

async function del(id) {
  await fetch("/api/movies/"+id, {method:"DELETE"});
  load();
}

load();
</script>

</body>
</html>
