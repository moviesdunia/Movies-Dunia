<!DOCTYPE html>
<html>
<head>
  <title>Movies Dunia</title>
  <style>
    body { background: black; color: white; font-family: Arial; }
    .movie { margin: 20px; }
  </style>
</head>
<body>

<h1 style="color:red;">Movies Dunia</h1>

<div id="movies"></div>

<script>
async function loadMovies() {
  const res = await fetch('/api/movies');
  const movies = await res.json();

  const container = document.getElementById('movies');
  container.innerHTML = '';

  if (movies.length === 0) {
    container.innerHTML = "<p>No movies available</p>";
    return;
  }

  movies.forEach(movie => {
    const div = document.createElement('div');
    div.className = 'movie';

    div.innerHTML = `
      <h3>${movie.title}</h3>
      <video width="300" controls poster="${movie.poster}">
        <source src="${movie.videoUrl}" type="video/mp4">
      </video>
    `;

    container.appendChild(div);
  });
}

loadMovies();
</script>

</body>
</html>
