<!DOCTYPE html>
<html>
<head>
  <title>Movies Dunia</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
    }
    h1 {
      color: red;
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }
    .card {
      width: 150px;
    }
    img {
      width: 100%;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h1>Movies Dunia</h1>
<div class="grid" id="movies"></div>

<script>
async function loadMovies() {
  const res = await fetch("/api/movies");
  const data = await res.json();

  const container = document.getElementById("movies");
  container.innerHTML = "";

  data.forEach(m => {
    container.innerHTML += `
      <div class="card">
        <img src="${m.poster}" />
        <p>${m.title}</p>
        <a href="${m.link}" target="_blank">Watch</a>
      </div>
    `;
  });
}

loadMovies();
</script>

</body>
</html>
