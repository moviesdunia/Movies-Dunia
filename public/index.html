<!DOCTYPE html>
<html>
<head>
<title>Movies Dunia</title>
<style>
body { background:black; color:white; margin:0; font-family:Arial; }
h1 { color:red; padding:15px; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
  padding:15px;
}

.card { cursor:pointer; transition:0.3s; }
.card:hover { transform:scale(1.1); }

img { width:100%; height:250px; object-fit:cover; }
</style>
</head>

<body>

<h1>Movies Dunia</h1>
<div class="grid" id="movies"></div>

<script>
async function loadMovies() {
  try {
    const res = await fetch("/api/movies");
    const data = await res.json();

    const container = document.getElementById("movies");

    if (data.length === 0) {
      container.innerHTML = "<h2>No Movies Yet</h2>";
      return;
    }

    data.forEach(m => {
      container.innerHTML += `
        <div class="card" onclick="play('${m.videoUrl}')">
          <img src="${m.poster}">
          <h3>${m.title}</h3>
        </div>
      `;
    });

  } catch {
    document.getElementById("movies").innerHTML =
      "<h2>Server Loading... Refresh</h2>";
  }
}

function play(url) {
  window.location.href = "/player.html?video=" + encodeURIComponent(url);
}

loadMovies();
</script>

</body>
</html>
