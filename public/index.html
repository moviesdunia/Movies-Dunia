<!DOCTYPE html>
<html>
<head>
  <title>Movies Dunia</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      margin: 0;
    }

    h1 {
      color: red;
      padding: 15px;
    }

    .movies {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: #111;
      padding: 10px;
      border-radius: 10px;
    }

    video {
      width: 100%;
      border-radius: 8px;
    }

    button {
      margin-top: 5px;
      width: 100%;
      padding: 8px;
      background: red;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Movies Dunia</h1>

<div class="movies" id="movies"></div>

<script>
const API = "https://movies-dunia-1.onrender.com/api/movies";

async function loadMovies() {
  try {
    const res = await fetch(API);
    const data = await res.json();

    const container = document.getElementById("movies");

    if (data.length === 0) {
      container.innerHTML = "<h3>No Movies Yet</h3>";
      return;
    }

    container.innerHTML = data.map(movie => `
      <div class="card">
        <h3>${movie.title}</h3>
        <video controls src="${movie.videoUrl}"></video>
        <button onclick="downloadVideo('${movie.videoUrl}')">
          Download
        </button>
      </div>
    `).join("");

  } catch (err) {
    console.log(err);
  }
}

function downloadVideo(url) {
  const a = document.createElement("a");
  a.href = url;
  a.download = "movie.mp4";
  a.click();
}

loadMovies();
</script>

</body>
</html>
