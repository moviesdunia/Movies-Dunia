<!DOCTYPE html>
<html>
<head>
  <title>Movies Dunia</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
    }
    h1 {
      color: red;
    }
    .movie {
      margin: 20px 0;
    }
    video {
      width: 300px;
    }
    a {
      color: yellow;
      display: block;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h1>Movies Dunia</h1>

<div id="movies">Loading...</div>

<script>
const API = "https://movies-dunia-1.onrender.com"; // 👈 YOUR LIVE URL

async function loadMovies() {
  try {
    const res = await fetch(API + "/api/movies");
    const data = await res.json();

    const container = document.getElementById("movies");
    container.innerHTML = "";

    if (data.length === 0) {
      container.innerHTML = "<h3>No Movies Yet</h3>";
      return;
    }

    data.forEach(movie => {
      const div = document.createElement("div");
      div.className = "movie";

      div.innerHTML = `
        <h3>${movie.title}</h3>

        <video controls>
          <source src="${movie.videoUrl}" type="video/mp4">
        </video>

        <a href="${movie.videoUrl}" download>⬇ Download</a>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    document.getElementById("movies").innerHTML = "Error loading movies";
    console.error(err);
  }
}

loadMovies();
</script>

</body>
</html>
